<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="80" y1="80" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <path id="orbit-sm" d="M 245,150 A 95,37,0,1,0,55,150 A 95,37,0,1,0,245,150"/>
  </defs>

  <!-- Background -->
  <rect width="300" height="300" fill="#050510"/>

  <!-- Ambient glow -->
  <ellipse cx="150" cy="150" rx="160" ry="160" fill="url(#orb)"/>

  <!-- Large circular orbit -->
  <ellipse cx="150" cy="150" rx="95" ry="95" stroke="#0ea5e9" stroke-width="2.5" fill="none" opacity="0.8"/>

  <!-- Tilted elliptical orbit -->
  <ellipse cx="150" cy="150" rx="95" ry="37" stroke="#38bdf8" stroke-width="2" fill="none" opacity="0.7" transform="rotate(-28 150 150)"/>

  <!-- Nucleus outer glow -->
  <circle cx="150" cy="150" r="18" fill="#38bdf8" opacity="0.15"/>

  <!-- Nucleus -->
  <circle cx="150" cy="150" r="11" fill="url(#g)"/>
  <circle cx="150" cy="150" r="5.5" fill="#fff"/>

  <!-- Large orbit dot -->
  <circle cx="150" cy="55" r="9" fill="#0ea5e9"/>
  <circle cx="150" cy="55" r="4" fill="#fff" opacity="0.6"/>

  <!-- Small tilted orbit dot -->
  <circle cx="245" cy="150" r="7" fill="#a855f7"/>
  <circle cx="245" cy="150" r="3" fill="#fff" opacity="0.5"/>
</svg>
