<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    body { background: #050510; display: flex; flex-direction: column; gap: 60px; padding: 60px; font-family: sans-serif; }
    .option { display: flex; flex-direction: column; gap: 12px; }
    .label { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
    .logo-wrap { display: flex; align-items: center; }

    /* Show on dark background */
    .bg-dark { background: #050510; padding: 20px 30px; border-radius: 12px; }
    /* Show on light background */
    .bg-light { background: #fff; padding: 20px 30px; border-radius: 12px; margin-left: 20px; }
    .row { display: flex; align-items: center; gap: 20px; }
  </style>
</head>
<body>

  <!-- OPTION A: Clean wordmark + orbital dot -->
  <div class="option">
    <div class="label">Option A — Wordmark + orbital accent</div>
    <div class="row">
      <div class="bg-dark">
        <svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Text -->
          <text x="28" y="29" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-1" fill="#ffffff">agentgrid</text>
          <!-- Orbital ring around the 'a' dot area -->
          <ellipse cx="13" cy="20" rx="10" ry="10" stroke="url(#ga)" stroke-width="1.2" opacity="0.7"/>
          <ellipse cx="13" cy="20" rx="10" ry="5" stroke="url(#ga)" stroke-width="0.8" opacity="0.4" transform="rotate(-30 13 20)"/>
          <!-- Center dot -->
          <circle cx="13" cy="20" r="2.5" fill="#4f9ff0"/>
          <circle cx="13" cy="20" r="1.2" fill="#fff"/>
          <!-- Orbit dot 1 -->
          <circle cx="13" cy="10" r="1.8" fill="#6366f1"/>
          <!-- Orbit dot 2 -->
          <circle cx="23" cy="20" r="1.4" fill="#a855f7"/>
          <defs>
            <linearGradient id="ga" x1="3" y1="10" x2="23" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="bg-light">
        <svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="28" y="29" font-family="'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-1" fill="#080808">agentgrid</text>
          <ellipse cx="13" cy="20" rx="10" ry="10" stroke="url(#ga2)" stroke-width="1.2" opacity="0.7"/>
          <ellipse cx="13" cy="20" rx="10" ry="5" stroke="url(#ga2)" stroke-width="0.8" opacity="0.4" transform="rotate(-30 13 20)"/>
          <circle cx="13" cy="20" r="2.5" fill="#4f9ff0"/>
          <circle cx="13" cy="20" r="1.2" fill="#fff"/>
          <circle cx="13" cy="10" r="1.8" fill="#6366f1"/>
          <circle cx="23" cy="20" r="1.4" fill="#a855f7"/>
          <defs>
            <linearGradient id="ga2" x1="3" y1="10" x2="23" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
  </div>

  <!-- OPTION B: Grid icon + text -->
  <div class="option">
    <div class="label">Option B — Grid icon mark</div>
    <div class="row">
      <div class="bg-dark">
        <svg width="210" height="40" viewBox="0 0 210 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- 2x2 grid squares -->
          <rect x="2" y="2" width="14" height="14" rx="3" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="20" y="2" width="14" height="14" rx="3" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="2" y="20" width="14" height="14" rx="3" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="20" y="20" width="14" height="14" rx="3" fill="#a855f7"/>
          <!-- Connection lines -->
          <line x1="16" y1="9" x2="20" y2="9" stroke="rgba(99,102,241,0.4)" stroke-width="0.8"/>
          <line x1="9" y1="16" x2="9" y2="20" stroke="rgba(99,102,241,0.4)" stroke-width="0.8"/>
          <!-- Text -->
          <text x="46" y="28" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.5" fill="#ffffff">agentgrid</text>
          <defs>
            <linearGradient id="gb" x1="0" y1="0" x2="34" y2="34">
              <stop stop-color="#6366f1"/><stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="bg-light">
        <svg width="210" height="40" viewBox="0 0 210 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="14" height="14" rx="3" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="20" y="2" width="14" height="14" rx="3" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="2" y="20" width="14" height="14" rx="3" stroke="#6366f1" stroke-width="1.5"/>
          <rect x="20" y="20" width="14" height="14" rx="3" fill="#a855f7"/>
          <line x1="16" y1="9" x2="20" y2="9" stroke="rgba(99,102,241,0.4)" stroke-width="0.8"/>
          <line x1="9" y1="16" x2="9" y2="20" stroke="rgba(99,102,241,0.4)" stroke-width="0.8"/>
          <text x="46" y="28" font-family="'Inter', system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="-0.5" fill="#080808">agentgrid</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- OPTION C: Orbital arcs — closest to original -->
  <div class="option">
    <div class="label">Option C — Orbital arcs (closest to original style)</div>
    <div class="row">
      <div class="bg-dark">
        <svg width="240" height="48" viewBox="0 0 240 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Orbital system on left -->
          <ellipse cx="22" cy="24" rx="18" ry="18" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
          <ellipse cx="22" cy="24" rx="18" ry="8" stroke="#a855f7" stroke-width="0.8" opacity="0.4" transform="rotate(-25 22 24)"/>
          <ellipse cx="22" cy="24" rx="10" ry="18" stroke="#4f9ff0" stroke-width="0.8" opacity="0.3" transform="rotate(20 22 24)"/>
          <!-- Nucleus -->
          <circle cx="22" cy="24" r="3" fill="#4f9ff0"/>
          <circle cx="22" cy="24" r="1.5" fill="#fff"/>
          <!-- Orbiting dots -->
          <circle cx="22" cy="6" r="2.2" fill="#6366f1">
            <animateTransform attributeName="transform" type="rotate" from="0 22 24" to="360 22 24" dur="4s" repeatCount="indefinite"/>
          </circle>
          <circle cx="40" cy="24" r="1.8" fill="#a855f7">
            <animateTransform attributeName="transform" type="rotate" from="0 22 24" to="-360 22 24" dur="6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="22" cy="42" r="1.4" fill="#4f9ff0">
            <animateTransform attributeName="transform" type="rotate" from="180 22 24" to="540 22 24" dur="5s" repeatCount="indefinite"/>
          </circle>
          <!-- Text -->
          <text x="50" y="32" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-1" fill="#ffffff">agentgrid</text>
        </svg>
      </div>
      <div class="bg-light">
        <svg width="240" height="48" viewBox="0 0 240 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="22" cy="24" rx="18" ry="18" stroke="#6366f1" stroke-width="1" opacity="0.5"/>
          <ellipse cx="22" cy="24" rx="18" ry="8" stroke="#a855f7" stroke-width="0.8" opacity="0.4" transform="rotate(-25 22 24)"/>
          <ellipse cx="22" cy="24" rx="10" ry="18" stroke="#4f9ff0" stroke-width="0.8" opacity="0.3" transform="rotate(20 22 24)"/>
          <circle cx="22" cy="24" r="3" fill="#4f9ff0"/>
          <circle cx="22" cy="24" r="1.5" fill="#fff"/>
          <circle cx="22" cy="6" r="2.2" fill="#6366f1">
            <animateTransform attributeName="transform" type="rotate" from="0 22 24" to="360 22 24" dur="4s" repeatCount="indefinite"/>
          </circle>
          <circle cx="40" cy="24" r="1.8" fill="#a855f7">
            <animateTransform attributeName="transform" type="rotate" from="0 22 24" to="-360 22 24" dur="6s" repeatCount="indefinite"/>
          </circle>
          <circle cx="22" cy="42" r="1.4" fill="#4f9ff0">
            <animateTransform attributeName="transform" type="rotate" from="180 22 24" to="540 22 24" dur="5s" repeatCount="indefinite"/>
          </circle>
          <text x="50" y="32" font-family="'Inter', system-ui, sans-serif" font-size="24" font-weight="700" letter-spacing="-1" fill="#080808">agentgrid</text>
        </svg>
      </div>
    </div>
  </div>

  <!-- OPTION D: Minimal — just gradient text + dot -->
  <div class="option">
    <div class="label">Option D — Gradient text, ultra minimal</div>
    <div class="row">
      <div class="bg-dark">
        <svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="30" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-1.5" fill="url(#gd)">agent</text>
          <text x="96" y="30" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="300" letter-spacing="-1" fill="#ffffff">grid</text>
          <circle cx="92" cy="22" r="3.5" fill="#a855f7"/>
          <defs>
            <linearGradient id="gd" x1="0" y1="0" x2="96" y2="0" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="bg-light">
        <svg width="200" height="40" viewBox="0 0 200 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <text x="0" y="30" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="800" letter-spacing="-1.5" fill="url(#gd2)">agent</text>
          <text x="96" y="30" font-family="'Inter', system-ui, sans-serif" font-size="26" font-weight="300" letter-spacing="-1" fill="#080808">grid</text>
          <circle cx="92" cy="22" r="3.5" fill="#a855f7"/>
          <defs>
            <linearGradient id="gd2" x1="0" y1="0" x2="96" y2="0" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
    </div>
  </div>

</body>
</html>
