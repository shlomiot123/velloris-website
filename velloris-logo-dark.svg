<svg width="512" height="100" viewBox="0 0 512 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gr" x1="296" y1="0" x2="376" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <path id="small-orbit" d="M 80,50 A 36,14,0,1,0,8,50 A 36,14,0,1,0,80,50"/>
  </defs>

  <!-- Dark background with padding -->
  <rect width="512" height="100" rx="14" fill="#050510"/>

  <!-- Orbital rings -->
  <ellipse cx="44" cy="50" rx="36" ry="36" stroke="#0ea5e9" stroke-width="1.8" fill="none" opacity="0.85"/>
  <ellipse cx="44" cy="50" rx="36" ry="14" stroke="#38bdf8" stroke-width="1.4" fill="none" opacity="0.75" transform="rotate(-28 44 50)"/>

  <!-- Nucleus -->
  <circle cx="44" cy="50" r="5.2" fill="#38bdf8"/>
  <circle cx="44" cy="50" r="2.6" fill="#fff"/>

  <!-- Large orbit dot -->
  <circle cx="44" cy="14" r="4" fill="#0ea5e9"/>

  <!-- Small tilted orbit dot (static for PNG) -->
  <circle cx="80" cy="50" r="3" fill="#a855f7"/>

  <!-- Wordmark -->
  <text font-family="'Inter',system-ui,sans-serif" font-size="60" font-weight="700" letter-spacing="-1">
    <tspan x="96" y="68" fill="#ffffff">velloris</tspan><tspan fill="url(#gr)">.ai</tspan>
  </text>
</svg>
