<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1128" y2="191" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </linearGradient>
    <linearGradient id="gr-top" x1="400" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gr-ai" x1="800" y1="0" x2="940" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="ai-glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1128" height="191" fill="url(#bg)"/>

  <!-- Ambient orbs -->
  <ellipse cx="850" cy="80" rx="340" ry="200" fill="url(#orb1)"/>
  <ellipse cx="1060" cy="50" rx="220" ry="160" fill="url(#orb2)"/>
  <ellipse cx="650" cy="160" rx="200" ry="130" fill="url(#orb3)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="63" x2="1128" y2="63" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="127" x2="1128" y2="127" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="564" y1="0" x2="564" y2="191" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="846" y1="0" x2="846" y2="191" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Accent gradient line top -->
  <rect x="0" y="0" width="1128" height="2" fill="url(#gr-top)" opacity="0.6"/>

  <!-- === ORBITAL LOGO === -->
  <ellipse cx="360" cy="95" rx="62" ry="62" stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.75"/>
  <ellipse cx="360" cy="95" rx="62" ry="24" stroke="#38bdf8" stroke-width="1.2" fill="none" opacity="0.65" transform="rotate(-28 360 95)"/>
  <circle cx="360" cy="95" r="7.5" fill="#38bdf8"/>
  <circle cx="360" cy="95" r="3.8" fill="#fff"/>
  <circle cx="360" cy="33" r="5.5" fill="#0ea5e9"/>
  <circle cx="422" cy="95" r="4.5" fill="#a855f7"/>

  <!-- === WORDMARK === -->
  <!-- "velloris" with positive letter-spacing so letters breathe -->
  <text x="460" y="118" font-family="'Inter',system-ui,-apple-system,sans-serif" font-size="68" font-weight="800" letter-spacing="3" fill="#ffffff">velloris</text>

  <!-- ".ai" glow layer -->
  <text x="460" y="118" font-family="'Inter',system-ui,-apple-system,sans-serif" font-size="68" font-weight="800" letter-spacing="3" filter="url(#ai-glow)" opacity="0.85">
    <tspan fill-opacity="0">velloris</tspan><tspan fill="url(#gr-ai)" letter-spacing="-1">.ai</tspan>
  </text>

  <!-- ".ai" solid on top -->
  <text x="460" y="118" font-family="'Inter',system-ui,-apple-system,sans-serif" font-size="68" font-weight="800" letter-spacing="3">
    <tspan fill-opacity="0">velloris</tspan><tspan fill="url(#gr-ai)" letter-spacing="-1">.ai</tspan>
  </text>

  <!-- Tagline -->
  <text x="461" y="150" font-family="'Inter',system-ui,-apple-system,sans-serif" font-size="13" font-weight="400" fill="rgba(255,255,255,0.35)" letter-spacing="0.1em">RE-ENGINEERING ORGANIZATIONS FOR THE GENERATIVE ERA.</text>

  <!-- Decorative dots right -->
  <circle cx="1085" cy="48" r="2" fill="rgba(56,189,248,0.4)"/>
  <circle cx="1105" cy="82" r="1.5" fill="rgba(168,85,247,0.4)"/>
  <circle cx="1065" cy="115" r="1" fill="rgba(56,189,248,0.3)"/>
  <circle cx="1095" cy="148" r="2.5" fill="rgba(168,85,247,0.25)"/>
  <circle cx="1112" cy="160" r="1" fill="rgba(56,189,248,0.35)"/>
</svg>
