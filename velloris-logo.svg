<svg width="512" height="100" viewBox="0 0 256 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gr" x1="148" y1="0" x2="188" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="small-orbit" d="M 40,25 A 18,7,0,1,0,4,25 A 18,7,0,1,0,40,25"/>
  </defs>

  <!-- Orbital rings -->
  <ellipse cx="22" cy="25" rx="18" ry="18" stroke="#0ea5e9" stroke-width="0.9" opacity="0.4"/>
  <ellipse cx="22" cy="25" rx="18" ry="7" stroke="#38bdf8" stroke-width="0.7" opacity="0.3" transform="rotate(-28 22 25)"/>

  <!-- Nucleus -->
  <circle cx="22" cy="25" r="2.6" fill="#38bdf8"/>
  <circle cx="22" cy="25" r="1.3" fill="#fff"/>

  <!-- Large orbit dot -->
  <g>
    <circle cx="22" cy="7" r="2" fill="#0ea5e9">
      <animateTransform attributeName="transform" type="rotate" from="0 22 25" to="360 22 25" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Small tilted orbit dot -->
  <g transform="rotate(-28 22 25)">
    <circle r="1.5" fill="#a855f7">
      <animateMotion dur="7s" repeatCount="indefinite">
        <mpath href="#small-orbit"/>
      </animateMotion>
    </circle>
  </g>

  <!-- Wordmark -->
  <text font-family="'Inter',system-ui,sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5">
    <tspan x="48" y="34" fill="#ffffff">velloris</tspan><tspan fill="url(#gr)">.ai</tspan>
  </text>

  <!-- .ai glow pulse overlay -->
  <text x="48" y="34" font-family="'Inter',system-ui,sans-serif" font-size="30" font-weight="700" letter-spacing="-0.5" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0;0;0.9;1;0.9;0;0;0" keyTimes="0;0.18;0.36;0.46;0.5;0.54;0.64;0.82;1" dur="4s" repeatCount="indefinite"/>
    <tspan fill-opacity="0">velloris</tspan><tspan fill="url(#gr)">.ai</tspan>
  </text>
</svg>
